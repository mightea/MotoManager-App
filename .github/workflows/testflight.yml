# Build, test and upload MotoManager to TestFlight.
#
# Trigger: push a tag like v1.2.3 (MARKETING_VERSION is taken from the tag),
# or run manually via workflow_dispatch (MARKETING_VERSION comes from the
# release-please version.txt at the dispatched ref).
#
# After the upload, a follow-up job waits for App Store Connect to finish
# processing the build and sets its TestFlight "What to Test" text from the
# version's CHANGELOG.md section.
#
# Signing model (no Fastlane, no cloud signing): the Apple Distribution
# certificate (.p12) and the App Store provisioning profile live in GitHub
# secrets; the cert is imported into a throwaway keychain per run, the
# profile installed for the export step, and the export signs MANUALLY with
# exactly those two. Cloud signing is deliberately avoided — creating
# cloud-managed distribution certificates requires an Admin API key, which
# CI should not hold. The export step uploads the archive directly to App
# Store Connect, authenticated with an App Manager API key.
#
# Required configuration (Settings → Environments → "testflight"):
#   secrets:
#     ASC_API_KEY_ID       App Store Connect API key ID (Team key, App Manager)
#     ASC_API_ISSUER_ID    ASC issuer UUID
#     ASC_API_KEY_P8       contents of the AuthKey_*.p8, base64-encoded
#     DIST_CERT_P12        Apple Distribution cert + private key, base64 p12
#     DIST_CERT_PASSWORD   password of that p12
#     DIST_PROFILE_B64     App Store provisioning profile for the app's
#                          bundle id, base64 .mobileprovision
#   variables:
#     APPLE_TEAM_ID        the paid team's ID (not the personal team)
#
# Annual chore: the distribution certificate expires after one year, and the
# provisioning profile with it — re-export the p12, regenerate + re-download
# the profile, update DIST_CERT_P12 / DIST_CERT_PASSWORD / DIST_PROFILE_B64.

name: TestFlight

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  SCHEME: MotoManager
  PROJECT: MotoManager.xcodeproj

jobs:
  test:
    name: Unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          set -o pipefail
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+( Pro)?' | sort -Vr | head -1)
          echo "Testing on simulator: ${DEVICE:?no iPhone simulator available}"
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO \
            | tail -100

  upload:
    name: Archive & upload to TestFlight
    needs: test
    runs-on: macos-26
    environment: testflight
    outputs:
      marketing_version: ${{ steps.version.outputs.marketing_version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Import distribution certificate into a throwaway keychain
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          echo -n "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Install provisioning profile
        id: profile
        env:
          DIST_PROFILE_B64: ${{ secrets.DIST_PROFILE_B64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$DIST_PROFILE_B64" | base64 --decode > "$PROFILE_DIR/motomanager-appstore.mobileprovision"
          # The export options must reference the profile by its portal name —
          # read it from the profile itself so a rename never breaks CI.
          NAME=$(security cms -D -i "$PROFILE_DIR/motomanager-appstore.mobileprovision" | plutil -extract Name raw -)
          echo "Installed profile: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        run: |
          # Tag v1.2.3 → MARKETING_VERSION 1.2.3; manual dispatches use the
          # newest v* tag (falls back to the project setting when no release
          # exists yet). Build number: run*100 + attempt — a single integer
          # that stays unique across re-runs (Apple rejects reused build
          # numbers per version) and monotonic across runs.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            git fetch --tags --force --depth=1 origin
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
            VERSION="${LATEST#v}"
          fi
          if [[ -n "$VERSION" ]]; then
            echo "marketing_args=MARKETING_VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "marketing_args=" >> "$GITHUB_OUTPUT"
          fi
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))" >> "$GITHUB_OUTPUT"

      - name: Archive
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/MotoManager.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            ${{ steps.version.outputs.marketing_args }} \
            | tail -60

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          set -euo pipefail
          # Manual signing: exactly the imported cert + installed profile.
          # No -allowProvisioningUpdates — the API key only authenticates the
          # upload, never cloud signing.
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ltd.herrmann.MotoManager</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MotoManager.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            | tail -40

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/exportOptions.plist"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/motomanager-appstore.mobileprovision"

  # Attach the release-please changelog section for this version as the
  # build's TestFlight "What to Test" text. Runs on a cheap Linux runner
  # because App Store Connect takes minutes to process an upload and the
  # notes can only be set once processing finishes.
  release_notes:
    name: Attach release notes in TestFlight
    needs: upload
    if: needs.upload.outputs.marketing_version != ''
    runs-on: ubuntu-latest
    environment: testflight
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract this version's changelog section
        id: notes
        env:
          VERSION: ${{ needs.upload.outputs.marketing_version }}
        run: |
          set -euo pipefail
          # Section between this version's "## x.y.z" heading and the next
          # version heading; markdown links and heading markers stripped for
          # TestFlight's plain-text field.
          awk -v ver="$VERSION" '
            $0 ~ "^#+ +\\[?" ver "[] (]" {grab=1; next}
            grab && /^#+ +\[?[0-9]+\./ {exit}
            grab {print}
          ' CHANGELOG.md \
            | sed -E 's/\[([^]]*)\]\([^)]*\)/\1/g; s/^#+ +//' \
            | awk 'NF {blank=0; print} !NF {if (++blank < 2) print}' > notes.txt
          if [[ -s notes.txt ]]; then
            echo "Notes for $VERSION:"; cat notes.txt
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog section found for $VERSION — skipping."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set the build's What to Test
        if: steps.notes.outputs.has_notes == 'true'
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          VERSION: ${{ needs.upload.outputs.marketing_version }}
          BUILD_NUMBER: ${{ needs.upload.outputs.build_number }}
        run: |
          set -euo pipefail
          pip install --quiet PyJWT cryptography
          python3 - <<'EOF'
          import base64, json, os, sys, time
          from urllib.request import Request, urlopen

          import jwt

          KEY_ID = os.environ["ASC_API_KEY_ID"]
          ISSUER = os.environ["ASC_API_ISSUER_ID"]
          KEY = base64.b64decode(os.environ["ASC_API_KEY_P8"]).decode()
          VERSION = os.environ["VERSION"]
          BUILD_NUMBER = os.environ["BUILD_NUMBER"]
          BUNDLE_ID = "ltd.herrmann.MotoManager"
          API = "https://api.appstoreconnect.apple.com"
          # TestFlight caps whatsNew at 4000 characters.
          NOTES = open("notes.txt").read().strip()[:4000]

          def call(method, path, body=None):
              now = int(time.time())
              token = jwt.encode(
                  {"iss": ISSUER, "iat": now, "exp": now + 600,
                   "aud": "appstoreconnect-v1"},
                  KEY, algorithm="ES256", headers={"kid": KEY_ID})
              req = Request(
                  API + path, method=method,
                  headers={"Authorization": f"Bearer {token}",
                           "Content-Type": "application/json"},
                  data=json.dumps(body).encode() if body else None)
              with urlopen(req) as resp:
                  data = resp.read()
                  return json.loads(data) if data else {}

          app = call("GET", f"/v1/apps?filter[bundleId]={BUNDLE_ID}")["data"][0]

          # The upload finishes before App Store Connect ingests the build;
          # poll until it appears and leaves the PROCESSING state.
          build = None
          deadline = time.time() + 40 * 60
          while time.time() < deadline:
              try:
                  r = call("GET",
                           f"/v1/builds?filter[app]={app['id']}"
                           f"&filter[version]={BUILD_NUMBER}"
                           f"&filter[preReleaseVersion.version]={VERSION}&limit=1")
              except Exception as err:  # transient API hiccup — keep polling
                  print(f"Poll failed ({err}), retrying...", flush=True)
                  time.sleep(60)
                  continue
              if r["data"]:
                  build = r["data"][0]
                  state = build["attributes"]["processingState"]
                  if state == "VALID":
                      break
                  if state in ("FAILED", "INVALID"):
                      sys.exit(f"Build {VERSION} ({BUILD_NUMBER}) processing ended in {state}")
              print(f"Waiting for build {VERSION} ({BUILD_NUMBER}) to finish processing...",
                    flush=True)
              time.sleep(60)
          else:
              sys.exit("Timed out waiting for App Store Connect to process the build")

          locs = call("GET",
                      f"/v1/builds/{build['id']}/betaBuildLocalizations"
                      "?fields[betaBuildLocalizations]=locale")["data"]
          if locs:
              for loc in locs:
                  call("PATCH", f"/v1/betaBuildLocalizations/{loc['id']}",
                       {"data": {"id": loc["id"], "type": "betaBuildLocalizations",
                                 "attributes": {"whatsNew": NOTES}}})
                  print(f"Updated What to Test ({loc['attributes']['locale']})")
          else:
              locale = app["attributes"]["primaryLocale"]
              call("POST", "/v1/betaBuildLocalizations",
                   {"data": {"type": "betaBuildLocalizations",
                             "attributes": {"locale": locale, "whatsNew": NOTES},
                             "relationships": {"build": {"data": {"type": "builds",
                                                                  "id": build["id"]}}}}})
              print(f"Created What to Test ({locale})")
          EOF
